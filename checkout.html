<!DOCTYPE html>
<html>
<head>
    <title>Checkout</title>
</head>
<body>
<h1>Checkout</h1>
<form>
    Full Name: <input type="text" placeholder="Enter your full name" required><br><br>
    Address: <input type="text" placeholder="Enter your shipping address" required><br><br>

    <h3>Payment Information</h3>
    Credit Card Number: <input type="text" placeholder="1234 5678 9012 3456" required><br><br>
    Expiration Date: <input type="text" placeholder="MM/YY" required><br><br>
    CVV: <input type="text" placeholder="123" required><br><br>

    <button type="submit">Place Order</button>
</form>
<h3>Order confirmation will be displayed here (placeholder)</h3>
<p>
    <a href="cart.html"><button type="button">Back to Cart</button></a>
    <a href="index.html"><button type="button">Back to Home</button></a>
</p>
</body>
</html>
