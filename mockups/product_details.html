<!DOCTYPE html>
<html>
<head>
    <title>Product Catalog</title>
    <style>
       {
            margin-bottom: 20px;
            width: 50%;
            padding: 5px;
        }
        .product {
            border: 1px solid #ccc;
            padding: 10px;
            margin-bottom: 10px;
        }
        .product-actions {
            margin-top: 10px;
        }
        button {
            margin-right: 5px;
            padding: 5px 10px;
        }
        input[type="number"] {
            width: 50px;
            margin-right: 5px;
        }
    </style>
</head>
<body>

<h1>Product Catalog</h1>


<input type="text" id="search-bar" placeholder="Search products..." onkeyup="filterProducts()">


<div id="product-list">
    <div class="product">
        <h3 class="product-name">Red T-Shirt</h3>
        <p class="product-category">Clothing</p>
        <p class="product-price">$19.99</p>

        <div class="product-actions">
            Quantity: <input type="number" value="1" min="1">
            <button onclick="addToCart('Red T-Shirt')">Add to Cart</button>
        </div>
    </div>

    <div class="product">
        <h3 class="product-name">Blue Jeans</h3>
        <p class="product-category">Clothing</p>
        <p class="product-price">$39.99</p>

        <div class="product-actions">
            Quantity: <input type="number" value="1" min="1">
            <button onclick="addToCart('Blue Jeans')">Add to Cart</button>
        </div>
    </div>

    <div class="product">
        <h3 class="product-name">Wireless Headphones</h3>
        <p class="product-category">Electronics</p>
        <p class="product-price">$99.99</p>

        <div class="product-actions">
            Quantity: <input type="number" value="1" min="1">
            <button onclick="addToCart('Wireless Headphones')">Add to Cart</button>
        </div>
    </div>

    <div class="product">
        <h3 class="product-name">Coffee Mug</h3>
        <p class="product-category">Kitchen</p>
        <p class="product-price">$12.99</p>

        <div class="product-actions">
            Quantity: <input type="number" value="1" min="1">
            <button onclick="addToCart('Coffee Mug')">Add to Cart</button>
        </div>
    </div>
</div>


<div style="margin-top: 20px;">
    <button onclick="goHome()">Home</button>
    <button onclick="viewCart()">View Cart</button>
</div>

<script>
    function filterProducts() {
        let input = document.getElementById('search-bar').value.toLowerCase();
        let products = document.getElementsByClassName('product');

        for (let i = 0; i < products.length; i++) {
            let name = products[i].getElementsByClassName('product-name')[0].innerText.toLowerCase();
            let category = products[i].getElementsByClassName('product-category')[0].innerText.toLowerCase();

            if (name.includes(input) || category.includes(input)) {
                products[i].style.display = "block";
            } else {
                products[i].style.display = "none";
            }
        }
    }


    function addToCart(productName) {
        alert(productName + " added to cart! (Placeholder action)");
    }

    function goHome() {
        window.location.href = "index.html"; 
    }

    function viewCart() {
        window.location.href = "cart.html"; 
    }
</script>

</body>
</html>
